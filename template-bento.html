<style>
    :root {
        --color-dark: #0E1B2A;
        --color-background-light: #F2F4F7; 
        --color-accent: #4F8CFF; 
        --color-light-text: #f0e8e8;
        --color-dark-text: #050505;
        --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        --radius: 24px; 
        --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px;}
    body { font-family: var(--font-main); background-color: var(--color-dark); color: var(--color-dark-text); line-height: 1.6; overflow-x: hidden; }
/* --- Layout --- */
    .section { padding: 60px 5%; max-width: 1600px; margin: 20px auto; background: white; border-radius: var(--radius); border: var(--border);   box-shadow: var(--shadow); }
    #hero, #services, #testimonials, #social-proof, #about, #practical, #faq, #contact { width: 94%; }
    .bg-dark { background-color: var(--color-dark) !important; color: white; border: none; }
    .bg-accent { background-color: var(--color-accent) !important; border: none; }
/* Typographies */
    h1, h2, h3 { font-weight: 800; letter-spacing: -0.04em; }
    h1 { font-size: clamp(2.5rem, 4vw, 3rem); line-height: 1; margin-bottom: 24px; color: var(--color-dark);}
    h2 { font-size: clamp(2rem, 4vw, 3rem); text-align: center; margin-bottom: 40px; color: var(--color-dark) }
/* --- Boutons --- */
    .cta-button { background: var(--color-accent); color: var(--color-dark); padding: 14px 28px; border-radius: 14px; font-weight: 700; 
    text-decoration: none; display: inline-flex; align-items: center; justify-content: center; text-align: center; transition: 0.3s; 
    border: none; width: auto; }
    .cta-button:hover { transform: translateY(-2px); filter: brightness(1.1); }
/* --- Header --- */
    header { position: sticky; top: 15px; z-index: 1000; padding: 10px 20px; width: 94%; background: var(--color-background-light);    border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin: 20px auto; max-width: 1600px; }
    #header-cta { padding: 10px 18px; font-size: 0.9rem; white-space: nowrap; }
    .logo-text { color: var(--color-dark); font-weight: 900; text-transform: uppercase; }
    .logo-img { height: 60px; max-width: 60px; object-fit: contain; }
/* --- Hero  --- */
    #hero { display: flex; justify-content: center; margin: 20px auto; padding: 0; }
    .hero-container { display: grid !important; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 1600px; }
    .hero-text-side { background: white; padding: 40px; border-radius: var(--radius); box-shadow: var(--shadow); text-align: left;        display: flex; flex-direction: column; }
    #hero-cta-btn { align-self: flex-start; width: auto; margin-top: 20px; }
    .hero-image-side { height: 350px; border-radius: var(--radius); overflow: hidden; border: var(--border); }
    .hero-img { width: 100%; height: 100%; object-fit: cover; }
/* Chiffres Clés */
    .key-figures { display: grid !important; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 30px; width: 100% !important; }
    .figure { background: var(--color-background-light); padding: 15px; border-radius: 16px; border: 1px solid var(--color-accent);       text-align: center; }
    .figure:nth-child(3) { grid-column: span 2; }
    .figure-num { font-size: 1.8rem; font-weight: 900; color: var(--color-dark); display: block; }
    .figure small { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #666; }
/* --- Services --- */
    #services { background: var(--color-accent); }
    #services h3 { color: var(--color-accent); }
    .services-grid { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
    .service-card { padding: 40px; width: 100%; max-width: none; border-radius: var(--radius); background: var(--color-background-light);         box-shadow: var(--shadow); border: 2px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex;        flex-direction: column; justify-content: space-between; }
    .service-card:hover { transform: translateY(-5px); border: 2px solid var(--color-dark); box-shadow: none; }
    .price-tag { display: inline-block; align-self: flex-start; margin-top: 20px; padding: 8px 16px; background: var(--color-accent);        color: var(--color-dark); border-radius: 12px; font-weight: 700; border: none; }
/* Testimonials */
    #testimonials-title {color: var(--color-dark); }
    .testimonials-grid { display: grid; grid-template-columns: 1fr; gap: 30px; max-width: 1200px; margin: 0 auto; }
    .testimonial-card { background: white; padding: 30px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--color-accent); display: flex; flex-direction: column; justify-content: space-between; }
    .testimonial-card:hover { transform: translateY(-8px) scale(1.01); border-color: var(--color-light-text); box-shadow: 0 15px 35px rgba(14, 27, 42, 0.1); }
    .testimonial-stars { color: #FFD700; margin-bottom: 15px; font-size: 1.2rem; }
    .testimonial-text { font-style: italic; color: var(--color-dark-text); margin-bottom: 20px; font-size: 0.95rem; }
    .testimonial-author { border-top: 1px solid #eee; padding-top: 15px; }
    .author-name { display: block; font-weight: 800; color: var(--color-dark); font-size: 0.9rem; text-transform: uppercase; }
    .author-role { display: block; font-size: 0.8rem; color: var(--color-accent); font-weight: 600; }
    .testimonials-footer-cta { margin-top: 50px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px;}
    .testimonials-cta-phrase { font-size: 1.1rem; font-weight: 700; color: var(--color-dark); max-width: 600px; line-height: 1.4; }
/* Social Proof */
    #gallery-title {color: var(--color-dark); }
    #social-proof { background: white; }
    .gallery-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
    .gallery-item { border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); position: relative; aspect-ratio: 4/5;         border: var(--border); background: var(--color-dark); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover;  }
    .gallery-caption { position: absolute;  bottom: 12px; left: 12px; right: 12px; background: rgba(14, 27, 42, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: var(--color-light-text); padding: 15px; font-size: 0.85rem; font-weight: 500;       line-height: 1.4; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); opacity: 1;        transform: translateY(0); }
/* About */
    #about-title {color: var(--color-dark);}
    .about-img { width: 100%; max-width: 500px; height: 400px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 40px; object-fit: cover; }
/* --- Infos pratiques --- */
    #practical { background: white; position: relative; }
    #practical::before { content: ""; position: absolute; width: 200px; height: 200px; background: var(--color-accent); filter: blur(100px); opacity: 0.1; bottom: 0; right: 0; z-index: 0;}
    .practical-container { display: flex; flex-direction: column; gap: 30px; max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
    .practical-info, .practical-hours { padding: 40px; background: var(--color-background-light); border: 1px solid var(--color-accent); border-radius: var(--radius); box-shadow: var(--shadow); }
    .practical-container h3 { font-size: 0.9rem; color: var(--color-accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px;  font-weight: 800; }
    #practical-address { font-size: 1.6rem; font-weight: 700; color: var(--color-dark); line-height: 1.3; margin-bottom: 30px; }
    .hours-list { list-style: none; }
    .hours-list li { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(0, 0, 0, 0.05); font-weight: 500; color: var(--color-dark-text); }
    .hours-list li span:first-child { color: var(--color-dark); font-weight: 700; }
    .hours-list li:last-child { border-bottom: none; }
    .planning-img { width: 100%; height: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
/* FAQ */
    #faq-title {color: var(--color-dark); max-width: 800px; margin: 60px auto; }
    .faq-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
    .faq-item { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--color-accent); transition: all 0.3s ease; }
    .faq-question { width: 100%; padding: 20px 25px; background: none; border: none; display: flex; justify-content: space-between; align-items: center; cursor: pointer; text-align: left; font-weight: 700; color: var(--color-dark); font-family: var(--font-main); font-size: 1.1rem; }
    .faq-question::after { content: '+'; font-size: 1.5rem; color: var(--color-accent); transition: transform 0.3s ease; }
    .faq-item.open .faq-question::after { transform: rotate(45deg); }
    .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s ease; padding: 0 25px; color: var(--color-dark-text); font-size: 0.95rem; line-height: 1.6; }
    .faq-item.open .faq-answer { max-height: 500px; padding-bottom: 25px; }
/* Contact Section */
    #contact-title {color: var(--color-dark);}
    #contact { text-align: center; }
    #contact-cta-btn { margin: 40px auto 0 auto; display: inline-block; }
/* Footer & Socials */
    footer { padding: 50px 5%; background: var(--color-dark); color: white; text-align: center; }
    .social-title { font-weight: 900; text-transform: uppercase; margin-bottom: 20px; font-size: 1.2rem; color: var(--color-accent); }
    .social-links { margin-bottom: 35px; display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
    .social-links a { display: block; width: 40px; height: 40px; fill: var(--color-accent); transition: transform 0.2s ease; }
    .social-links a:hover { transform: scale(1.15); }
/* Mentions Légales */
    .legal-btn { background: none; border: none; color: #e9e3e3; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; margin: 5px; }
    .legal-content { background: var(--color-dark); text-align: left; transition: max-height 0.4s ease-out; max-height: 0; overflow: hidden; font-size: 0.85rem; }
    .legal-content.open { max-height: 1200px; padding: 30px; border: 1px solid #333; margin-top: 10px; }
    .legal-content h3 { color: var(--color-accent); margin: 20px 0 10px; text-transform: uppercase; font-size: 0.9rem; }
    .legal-content p { margin-bottom: 10px; color: #ccc; line-height: 1.6; }
    .footer-copy { font-size: 0.75rem; color: #e9e3e3; margin-top: 30px; }
    .footer-credit { font-size: 0.75rem; color: #e9e3e3; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .footer-credit a { color: #e9e3e3; text-decoration: none; border-bottom: 1px solid var(--color-accent); }
/* Responsive */
    @media (min-width: 768px) {
    .hero-container { grid-template-columns: 1.6fr 1fr; grid-template-rows: 600px; }
    .hero-text-side { height: 100%; justify-content: center;  }
    .hero-image-side { height: 100%; }
    .services-grid { grid-template-columns: 1.2fr 1fr; grid-template-rows: repeat(2, 1fr); gap: 25px; }
    .service-card:nth-child(1) { grid-column: 1; grid-row: 1 / span 2; justify-content: center; text-align: left;  }
    .service-card:nth-child(1) .price-tag { align-self: center; }
    .service-card:nth-child(2) { grid-column: 2; grid-row: 1; }
    .service-card:nth-child(3) { grid-column: 2; grid-row: 2; }
    .price-tag { display: inline-block; align-self: flex-start; margin-top: 20px;  padding: 8px 16px; background: var(--color-accent);         color: var(--color-dark); border-radius: 12px; font-weight: 700;  }
    .testimonials-grid { grid-template-columns: repeat(3, 1fr); }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .gallery-item { aspect-ratio: 16/9; }
    .gallery-item:nth-child(3n) { grid-column: span 2; aspect-ratio: 21/7; }
    .gallery-caption { bottom: 20px; left: 20px; right: 20px; padding: 20px; opacity: 0; transform: translateY(20px); transition: all 0.4s  cubic-bezier(0.16, 1, 0.3, 1); }
    .gallery-item:hover .gallery-caption { opacity: 1; transform: translateY(0); }
    .gallery-item img { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .gallery-item:hover img { transform: scale(1.08); }
    #about-title {text-align: left;}
    .about-flex { display: flex; align-items: center; gap: 80px; }
    .about-img { margin-bottom: 0; }
    .practical-container { flex-direction: row; align-items: stretch; gap: 40px; }
    .practical-info, .practical-hours { flex: 1; } }
/* Animations */
    .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .reveal.active { opacity: 1; transform: translateY(0); }
</style>
</head>

    const dynamicIcon = canvas.toDataURL('image/png');
    if (fav) fav.href = dynamicIcon;
    if (favApple) favApple.href = dynamicIcon;
}
// 2. Textes
    document.getElementById('hero-title').textContent = CONFIG.hero.title;
    document.getElementById('hero-desc').textContent = CONFIG.hero.desc;

    document.getElementById('services-title').textContent = CONFIG.services.title;
    document.getElementById('gallery-title').textContent = CONFIG.gallery.title;
    document.getElementById('about-title').textContent = CONFIG.about.title;

    document.getElementById('hero-img').alt = `Image de couverture de ${companyName}`;

// 3. CTA dynamique (Header & Contact)
const contactBtns = [document.getElementById('header-cta'), document.getElementById('contact-cta-btn')];
contactBtns.forEach(btn => {
    if (!btn) return;
    btn.textContent = CONFIG.contact.ctaLabel || "Prendre RDV";
    btn.onclick = (e) => {
        if (!CONFIG.contact.value || CONFIG.contact.value.trim() === "") {
            e.preventDefault();
            return;
        }
        const type = CONFIG.contact.type ? CONFIG.contact.type.toUpperCase() : "LINK";
        let val = CONFIG.contact.value.trim();

        if (type === "EMAIL") {
            e.preventDefault();
            try { if (val.includes('==')) val = atob(val); } catch(err) {}
            window.location.href = `mailto:${val}`;
        } 
        else if (type === "TEL") {
            e.preventDefault();
            window.location.href = `tel:${val.replace(/[^0-9+]/g, '')}`;
        } 
        else {
            window.open(val.startsWith('http') ? val : 'https://' + val, '_blank');
        }
    };
});
// 4. Figures
    const figCont = document.getElementById('figures-container');
    figCont.replaceChildren();
    if (CONFIG.hero.showFigures) {
        figCont.style.display = "flex";
        CONFIG.hero.figures.forEach(f => {
            const div = document.createElement('div');
            div.className = 'figure';
            const span = document.createElement('span');
            span.className = "figure-num";
            span.textContent = f.num;
            const small = document.createElement('small');
            small.textContent = f.label;
            div.append(span, small);
            figCont.appendChild(div);
        });
    } else {
        figCont.style.display = "none";

// 5. Services
const servGrid = document.getElementById('services-grid');
if (servGrid && CONFIG.services && CONFIG.services.items) {
    servGrid.replaceChildren();
    CONFIG.services.items.forEach(s => {
        const card = document.createElement('div');
        card.className = 'service-card reveal';
        const h3 = document.createElement('h3');
        h3.textContent = s.h3 || "";
        const p = document.createElement('p');
        p.textContent = s.p || "";
        card.append(h3, p);
        const hasVisiblePrefix = s.showPrefix !== false && s.prefix && s.prefix.trim() !== "";
        const hasVisiblePrice = s.showPrice !== false && s.price && s.price.trim() !== "";
        if (hasVisiblePrefix || hasVisiblePrice) {
            const priceTag = document.createElement('div');
            priceTag.className = "price-tag";   
            let textParts = [];   
            if (hasVisiblePrefix) textParts.push(s.prefix.trim());  
            if (hasVisiblePrice) {
                const valPrix = s.price.trim();
                const isNumeric = !isNaN(parseFloat(valPrix)) && isFinite(valPrix);
                textParts.push(valPrix + (isNumeric ? "€" : ""));
            }
            priceTag.textContent = textParts.join(" ");
            card.appendChild(priceTag);
        }
        servGrid.appendChild(card);
        if (typeof observer !== 'undefined') observer.observe(card); 
    });
}
// 6. Testimonials
const testSection = document.getElementById('testimonials');
const testGrid = document.getElementById('testimonials-grid');
if (CONFIG.testimonials && CONFIG.testimonials.show) {
    testSection.style.display = "block"; 
    document.getElementById('testimonials-title').textContent = CONFIG.testimonials.title;
    testGrid.replaceChildren();
    CONFIG.testimonials.items.forEach(t => {
        const card = document.createElement('div');
        card.className = 'testimonial-card reveal';
        const starsDiv = document.createElement('div');
        starsDiv.className = 'testimonial-stars';
        starsDiv.textContent = '★'.repeat(t.stars) + '☆'.repeat(5 - t.stars);
        const p = document.createElement('p');
        p.className = 'testimonial-text';
        p.textContent = `"${t.text}"`;
        const author = document.createElement('div');
        author.className = 'testimonial-author';
        const nameSpan = document.createElement('span');
        nameSpan.className = "author-name";
        nameSpan.textContent = t.name;
        const roleSpan = document.createElement('span');
        roleSpan.className = "author-role";
        roleSpan.textContent = t.role;
        
        author.append(nameSpan, roleSpan);
        card.append(starsDiv, p, author);
        testGrid.appendChild(card);
        if (typeof observer !== 'undefined') observer.observe(card);
    });
    let softCta = document.getElementById('testimonials-soft-cta');
    if (!softCta) {
        softCta = document.createElement('div');
        softCta.id = 'testimonials-soft-cta';
        softCta.className = 'testimonials-footer-cta reveal';
        testSection.appendChild(softCta);
    }
    softCta.replaceChildren();
    const ctaPhrase = document.createElement('p');
    ctaPhrase.className = 'testimonials-cta-phrase';
    ctaPhrase.textContent = CONFIG.testimonials.ctaText || "Prêt à passer à l'action ?";
    const ctaBtn = document.createElement('a');
    ctaBtn.className = 'cta-button';
    ctaBtn.textContent = CONFIG.contact.ctaLabel || "Prendre RDV";
    ctaBtn.href = "#";
    ctaBtn.onclick = (e) => {
        e.preventDefault();
        if (!CONFIG.contact.value || CONFIG.contact.value.trim() === "") return;

        let val = CONFIG.contact.value.trim();
        const type = CONFIG.contact.type ? CONFIG.contact.type.toUpperCase() : "LINK";

        if (type === "EMAIL" || type === "MAIL") { 
            try { if (val.includes('==')) val = atob(val); } catch(err) {}
            window.location.href = `mailto:${val}`; 
        }
        else if (type === "TEL") { 
            window.location.href = `tel:${val.replace(/\s/g, '')}`; 
        }
        else { 
            const url = val.startsWith('http') ? val : 'https://' + val;
            window.open(url, '_blank'); 
        }
    };
    softCta.append(ctaPhrase, ctaBtn);
    if (typeof observer !== 'undefined') observer.observe(softCta);

} else {
    if (testSection) testSection.style.display = "none"; 
}
// 7. Galerie
const gallerySection = document.getElementById('social-proof');
const galGrid = document.getElementById('gallery-grid');
if (CONFIG.gallery && CONFIG.gallery.show !== false) {
    gallerySection.style.display = "block";

    CONFIG.gallery.images.forEach((imgData, i) => {

} else {

}
// 8. Infos Pratiques 
const practicalSection = document.getElementById('practical');
if (CONFIG.practical && CONFIG.practical.show) {
    if (practicalSection) practicalSection.style.display = "block";
    const mainTitle = document.getElementById('practical-title');
    if (mainTitle) mainTitle.textContent = CONFIG.practical.title || "Infos Pratiques";
    const infoBlockH3 = practicalSection.querySelector('.practical-info h3');
    const hoursBlockH3 = practicalSection.querySelector('.practical-hours h3');
    if (infoBlockH3) infoBlockH3.textContent = CONFIG.practical.locationTitle || "Notre Emplacement";
    if (hoursBlockH3) hoursBlockH3.textContent = CONFIG.practical.hoursTitle || "Nos Horaires";
    const addrEl = document.getElementById('practical-address');
    if (addrEl) addrEl.textContent = CONFIG.practical.address || "Adresse non renseignée";
    const mapBtn = document.getElementById('practical-map-btn');
    if (mapBtn) {
        const isVisible = CONFIG.practical.showMapBtn !== false;
        mapBtn.style.display = isVisible ? "inline-flex" : "none";
        mapBtn.textContent = CONFIG.practical.mapBtnLabel || "Voir l'itinéraire";
        mapBtn.href = CONFIG.practical.mapsLink || "#";
    }
    const hoursContent = document.getElementById('hours-content');
    if (hoursContent) {
        hoursContent.replaceChildren();
        if (CONFIG.practical.displayMode === 'image') {
            const img = document.createElement('img');
            img.src = CONFIG.practical.hoursImg || P_IMG;
            img.className = "planning-img";
            img.alt = `Planning détaillé de ${companyName}`;
            img.loading = "lazy";
            hoursContent.appendChild(img);
        } else {
            const ul = document.createElement('ul');
            ul.className = "hours-list";
            const defaultLabels = ["Lun - Ven", "Samedi", "Dimanche"];
            defaultLabels.forEach((label, index) => {
                const li = document.createElement('li');
                const userItem = (CONFIG.practical.hoursItems && CONFIG.practical.hoursItems[index]) ? CONFIG.practical.hoursItems[index] : null;
                const userTime = userItem ? userItem.time : "";
                const spanLabel = document.createElement('span');
                spanLabel.textContent = label; 
                const spanTime = document.createElement('span');
                if (userTime && userTime.trim() !== "") {
                    spanTime.textContent = userTime;
                } else {
                    spanTime.textContent = "—";
                    spanTime.className = "opacity-40";
                }
                li.append(spanLabel, spanTime);
                ul.appendChild(li);
            });
            hoursContent.appendChild(ul);

    if (typeof observer !== 'undefined' && practicalSection) {
        observer.observe(practicalSection);
    }
} else {
    if (practicalSection) practicalSection.style.display = "none";
}
// 9. FAQ
const faqSection = document.getElementById('faq');
const faqCont = document.getElementById('faq-container');

}

// 11. Mentions légales 
const m = document.getElementById('legal-m');
if (m) {
    m.replaceChildren();
    const addLegalSection = (parent, title, lines) => {
        const h3 = document.createElement('h3');
        h3.textContent = title;
        parent.appendChild(h3);
        lines.forEach(line => {
            const displayVal = (line.val && line.val.trim() !== "") ? line.val : "Non renseigné";
            const p = document.createElement('p');
            const strong = document.createElement('strong');
            strong.textContent = line.label + " : ";
            p.appendChild(strong);
            p.appendChild(document.createTextNode(displayVal));
            parent.appendChild(p);
        });
    };
    const leg = CONFIG.legal || {};
    const country = leg.country || 'FR';
    const type = leg.entityType || 'pro';
    let labelID1 = "SIRET";
    let labelID2 = "SIREN";
    if (country === 'FR') {
        labelID1 = (type === 'asso') ? "N° RNA" : "SIRET";
        labelID2 = "SIRET (si applicable)";
    } else if (country === 'BE') {
        labelID1 = "BCE"; 
        labelID2 = "N° TVA";
    } else if (country === 'LU') {
        labelID1 = "N° RCS"; 
        labelID2 = "N° Matricule";
    }
    const entityLabel = (type === 'asso') ? "Nom de l'association" : "Raison Sociale";
    let contactDisplay = "";
    if (leg.contactValue) {
        try { contactDisplay = atob(leg.contactValue); } catch(e) { contactDisplay = leg.contactValue; }
    }
    const editorFullName = `${leg.firstName || ''} ${leg.lastName || ''}`.trim();
    const editionLines = [
        { label: "Éditeur", val: editorFullName },
        { label: entityLabel, val: leg.legalName },
        { label: "Adresse", val: leg.address },
        { label: "Contact", val: contactDisplay },
        { label: labelID1, val: leg.id1 },
        { label: labelID2, val: leg.id2 }
    ];
    addLegalSection(m, "Édition du site", editionLines);
    addLegalSection(m, "Hébergement", [
        { label: "Hébergeur", val: "Netlify Inc." },
        { label: "Adresse", val: "610 22nd Street, San Francisco, CA 94107, USA" }
    ]);
}
// 12. Politique de Confidentialité 
    const c = document.getElementById('legal-c');
    c.replaceChildren();
    addPrivacyParagraph(c, "Protection des données (RGPD)", "Ce site est purement informatif. Il ne contient aucun formulaire de contact ou d'inscription. Par conséquent, aucune donnée personnelle n'est collectée, stockée ou traitée par ce site.");
    addPrivacyParagraph(c, "Cookies et traceurs", "Ce site est une page statique. Nous n'utilisons aucun cookie de suivi, de profilage ou de publicité. Aucun traceur tiers n'est installé sur votre navigateur lors de votre visite.");
    addPrivacyParagraph(c, "Liens tiers", "Si vous cliquez sur les boutons de contact (ex: 'Prendre RDV'), vous serez redirigé vers une plateforme externe. Dès lors que vous quittez ce site, seule la politique de confidentialité de la plateforme de destination s'applique.");
    document.getElementById('current-year').textContent = new Date().getFullYear();
}
window.addEventListener('message', (event) => {
    if(event.data.type === 'UPDATE_CONFIG') {
        Object.assign(CONFIG, event.data.config);
        renderTemplate();
    }
    if(event.data.type === 'GET_CONFIG') {
        window.parent.postMessage({ type: 'SEND_CONFIG', config: CONFIG }, '*');
    }
    if(event.data.type === 'SCROLL_TO') {
        const target = document.getElementById(event.data.section);
        if(target){
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            target.style.transition = "outline 0.3s";
            target.style.outline = `4px solid ${CONFIG.colors.accent}`;
            setTimeout(() => target.style.outline = "none", 1500);
        }
    }
});
try {
    const savedData = document.getElementById('export-data').textContent.trim();
    if (savedData && !savedData.includes('CONFIG_EXPORT')) {
        const parsed = JSON.parse(savedData);
        Object.assign(CONFIG, parsed);
    }
} catch(e) { console.error("Erreur import", e); }
renderTemplate();
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
function toggleLegal(id) {
    const target = document.getElementById('legal-' + id);
    document.querySelectorAll('.legal-content').forEach(c => { if(c !== target) c.classList.remove('open'); });
    target.classList.toggle('open');
}
</script>
